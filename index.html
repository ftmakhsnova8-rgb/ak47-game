<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AK-47 Mobile Battle</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #444; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            padding: 8px; background: rgba(0,0,0,0.6); pointer-events: none; border-radius: 5px;
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
        }
        .joystick-base {
            width: 120px; height: 120px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; position: relative;
        }
        #stick {
            width: 60px; height: 60px; background: rgba(255,255,255,0.4);
            border-radius: 50%; position: absolute; top: 30px; left: 30px;
        }
        #shootBtn {
            width: 90px; height: 90px; background: rgba(255,0,0,0.5);
            border: 3px solid white; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 20px; user-select: none;
        }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">100</span> | Kills: <span id="kills">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <div class="joystick-base" id="joyBase"><div id="stick"></div></div>
        <div id="shootBtn">FIRE</div>
    </div>
